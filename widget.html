<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Счётчик воды</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1d23;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #252830;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      padding: 32px;
      max-width: 380px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      color: #c8cdd5;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      color: #6b7280;
      font-size: 13px;
    }

    .data-section {
      background: #1e2028;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 18px;
      border: 1px solid #333640;
    }

    .data-section h2 {
      font-size: 14px;
      color: #8b92a0;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid #2a2d35;
    }

    .data-row:last-child {
      border-bottom: none;
    }

    .data-label {
      font-size: 13px;
      color: #6b7280;
    }

    .data-value {
      font-weight: 600;
      font-size: 14px;
      color: #c8cdd5;
    }

    .data-time {
      text-align: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2d35;
      font-size: 12px;
      color: #555b68;
    }

    .buttons-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      padding: 13px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-get {
      background: #2563a0;
      color: #a0d0f0;
    }

    .btn-get:hover {
      background: #2e70b0;
    }

    .btn-calibrate {
      background: #8a6520;
      color: #f0d890;
    }

    .btn-calibrate:hover {
      background: #9a7530;
    }

    .btn-reset {
      background: #a03030;
      color: #f0a0a0;
    }

    .btn-reset:hover {
      background: #b04040;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #252830;
      border-radius: 12px;
      padding: 28px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    .modal h3 {
      color: #c8cdd5;
      margin-bottom: 16px;
      font-size: 17px;
      font-weight: 600;
    }

    .modal input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333640;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      background: #1e2028;
      color: #c8cdd5;
    }

    .modal input:focus {
      outline: none;
      border-color: #5a6a80;
      background: #252830;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .modal-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn-confirm {
      background: #2563a0;
      color: #a0d0f0;
    }

    .modal-btn-confirm:hover {
      background: #2e70b0;
    }

    .modal-btn-cancel {
      background: #444850;
      color: #b0b8c0;
    }

    .modal-btn-cancel:hover {
      background: #505560;
    }

    .status {
      text-align: center;
      margin-top: 12px;
      padding: 9px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #1e3028;
      color: #6abf80;
    }

    .status.error {
      display: block;
      background: #301e1e;
      color: #c08080;
    }

    .status.loading {
      display: block;
      background: #302e1e;
      color: #c0b080;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Счётчик воды</h1>
      <p>Мониторинг расхода</p>
    </div>

    <div class="data-section" id="dataSection">
      <h2>Текущие данные</h2>
      <div class="data-row">
        <span class="data-label">За сегодня</span>
        <span class="data-value" id="dailyLiters">--</span>
      </div>
      <div class="data-row">
        <span class="data-label">За месяц</span>
        <span class="data-value" id="monthlyLiters">--</span>
      </div>
      <div class="data-row">
        <span class="data-label">За всё время</span>
        <span class="data-value" id="totalLiters">--</span>
      </div>
      <div class="data-time" id="lastUpdate">Обновление: --</div>
    </div>

    <div class="buttons-section">
      <button class="btn btn-get" onclick="getData()">Получить данные</button>
      <button class="btn btn-calibrate" onclick="openCalibrateModal()">Калибровка</button>
      <button class="btn btn-reset" onclick="resetAll()">Сброс</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="modal-overlay" id="calibrateModal">
    <div class="modal">
      <h3>Калибровка</h3>
      <p style="color: #6b7280; margin-bottom: 12px; font-size: 13px;">Импульсов на литр:</p>
      <input type="number" id="calibrationInput" value="450" min="1" max="10000">
      <div class="modal-buttons">
        <button class="modal-btn modal-btn-confirm" onclick="confirmCalibrate()">Подтвердить</button>
        <button class="modal-btn modal-btn-cancel" onclick="closeCalibrateModal()">Отмена</button>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvKE-LWeEPCq_ePM6vwRFpV-atC76w_SMC6q6Kp4aFsCpFVKPISwUjtaHoWhzhWC0F/exec";

    function showStatus(message, type) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'status ' + type;
    }

    function hideStatus() {
      document.getElementById('status').className = 'status';
    }

    function formatLiters(v) {
      if (v === 0) return '0 л';
      if (v < 0.001) return '0 л';
      if (v < 1) return v.toFixed(3) + ' л';
      if (v < 100) return v.toFixed(2) + ' л';
      return v.toFixed(1) + ' л';
    }

    async function getData() {
      showStatus('Загрузка...', 'loading');
      try {
        const r = await fetch(SCRIPT_URL + '?action=read');
        const res = await r.json();
        if (!res.success) { showStatus('Ошибка: ' + (res.error || '?'), 'error'); return; }
        const d = res.data;
        document.getElementById('dailyLiters').textContent = formatLiters(d.dailyLiters);
        document.getElementById('monthlyLiters').textContent = formatLiters(d.monthlyLiters);
        document.getElementById('totalLiters').textContent = formatLiters(d.totalLiters);
        document.getElementById('lastUpdate').textContent = 'Обновление: ' + d.time;
        showStatus('Данные обновлены', 'success');
        setTimeout(hideStatus, 3000);
      } catch (e) { showStatus('Ошибка сети', 'error'); }
    }

    function openCalibrateModal() {
      document.getElementById('calibrateModal').classList.add('active');
    }

    function closeCalibrateModal() {
      document.getElementById('calibrateModal').classList.remove('active');
    }

    async function confirmCalibrate() {
      const v = parseFloat(document.getElementById('calibrationInput').value);
      if (isNaN(v) || v <= 0 || v > 10000) { showStatus('Введите число 1-10000', 'error'); return; }
      closeCalibrateModal();
      showStatus('Сохранение...', 'loading');
      try {
        const r = await fetch(SCRIPT_URL + '?action=calibrate&calibration=' + v);
        const res = await r.json();
        if (!res.success) { showStatus('Ошибка', 'error'); return; }
        showStatus('Калибровка: ' + v + ' имп./л', 'success');
        setTimeout(getData, 1000);
      } catch (e) { showStatus('Ошибка сети', 'error'); }
    }

    async function resetAll() {
      if (!confirm('Сбросить все параметры?\nКалибровка → 450\nВсё время → 0')) return;
      showStatus('Сброс...', 'loading');
      try {
        const r = await fetch(SCRIPT_URL + '?action=reset');
        const res = await r.json();
        if (!res.success) { showStatus('Ошибка', 'error'); return; }
        showStatus('Параметры сброшены', 'success');
        setTimeout(getData, 1000);
      } catch (e) { showStatus('Ошибка сети', 'error'); }
    }

    setInterval(getData, 60000);
    window.addEventListener('load', getData);
    document.getElementById('calibrateModal').addEventListener('click', function(e) {
      if (e.target === this) closeCalibrateModal();
    });
  </script>
</body>
</html>
